<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wombat University - Tampilan Awal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="landing-container">
        <div class="left-accent">
            <div class="brand-section">
                <img src="https://via.placeholder.com/80" alt="Wombat Logo" class="logo-main">
                <div class="brand-text">
                    <h1>Wombat University</h1>
                    <p>Our Burrow, Our Pride</p>
                </div>
            </div>
            <img src="https://via.placeholder.com/300x400" alt="Wombat Statue" class="wombat-statue">
        </div>

        <div class="main-content">
            <div class="login-card">
                <div class="card-header">
                    <img src="https://via.placeholder.com/60" alt="Wombat Emblem" class="card-logo">
                    <h2>WOMBAT UNIVERSITY</h2>
                </div>
                <div class="button-group">
                    <a href="#" class="btn-role">Dosen</a>
                    <a href="#" class="btn-role">Mahasiswa</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
